<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Cutieeeeee ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Pages */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    transition:all 0.8s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(0.9);
}

/* Text */
h1{font-size:3rem;margin-bottom:20px;}
p{font-size:1.2rem;max-width:700px;line-height:1.8;}

button{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4f81;
    font-size:1.1rem;
    cursor:pointer;
    font-weight:bold;
}

/* Hearts */
.heart{
    font-size:80px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

/* Stars */
.stars,.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.star,.heart-float{
    position:absolute;
    animation:float 8s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100px);}
}

/* Slideshow */
.slideshow img{
    width:250px;
    height:250px;
    border-radius:20px;
    object-fit:cover;
    margin:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Final fireworks */
.final{
    background:linear-gradient(135deg,#1a0023,#3a0a5c);
}

canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="hearts" id="hearts"></div>

<div class="page" id="page1">
    <div class="heart">❤️</div>
    <h1>Happy Birthday Cuteeeeeeee</h1>
    <p>I made something special just for you.</p>
    <button onclick="nextPage(1,2)">Open 💌 Meow Meow Meow</button>
</div>

<div class="page hidden" id="page2">
    <h1>You Are Special ✨</h1>
    <p>You bring happiness into my life every day.</p>

    <div class="slideshow">
        <img src="photo1Ani.jpg">
        <img src="photo12Ani.jpeg">
        <img src="Photo13ani.jpeg">
    </div>

    <button onclick="nextPage(2,3)">One More Thing ❤️</button>
</div>

<div class="page hidden" id="page3">
    <h1>💌 Final Surprise</h1>
    <p>You are my everything. I’m lucky to have you ❤️</p>

    <button onclick="nextPage(3,4)">See Surprise 🎆</button>
</div>

<div class="page hidden final" id="page4">
    <canvas id="fireworks"></canvas>
    <h1>🎆 Happy Birthday My cuteeeeeee 🎆</h1>
    <p>I love you forever ❤️</p>
</div>

<script>

function nextPage(cur,next){
    document.getElementById("page"+cur).classList.add("hidden");
    document.getElementById("page"+next).classList.remove("hidden");
}

/* Stars */
for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="star";
    s.innerHTML="✨";
    s.style.left=Math.random()*100+"%";
    s.style.fontSize=(10+Math.random()*20)+"px";
    document.getElementById("stars").appendChild(s);
}

/* Falling Hearts */
for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart-float";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(10+Math.random()*25)+"px";
    h.style.animationDuration=(5+Math.random()*8)+"s";
    document.getElementById("hearts").appendChild(h);
}

/* FIREWORKS */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){
    for(let i=0;i<30;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            vx:(Math.random()-0.5)*5,
            vy:(Math.random()-0.5)*5,
            life:100
        });
    }
}

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;

        ctx.fillStyle="white";
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0)particles.splice(i,1);
    });

    requestAnimationFrame(draw);
}

setInterval(createFirework,1000);
draw();

</script>

</body>
</html>
